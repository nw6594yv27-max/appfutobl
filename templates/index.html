<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Coach Fútbol - Subir vídeo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Karla:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <p class="brand">⚽ Coach de Fútbol</p>
        <div class="card">
            <div class="card__header">
                <p class="card__eyebrow">Análisis técnico por vídeo</p>
                <h1 class="card__title">Sube tu jugada</h1>
                <p class="card__subtitle">Grábate haciendo el gesto y te devolvemos feedback según tu edad y posición.</p>
            </div>
            <div class="card__body">
                <form action="/upload" method="post" enctype="multipart/form-data">
                    <div class="field">
                        <label class="field__label" for="gesto">Gesto a analizar</label>
                        <select id="gesto" name="gesto" required>
                            <option value="" disabled selected>Selecciona un gesto</option>
                            <option value="chut">Chut a portería</option>
                            <option value="pase">Pase</option>
                            <option value="control">Control de balón</option>
                            <option value="regate">Regate</option>
                            <option value="saque_banda">Saque de banda (con las manos)</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="field__label" for="edad">Edad (años)</label>
                        <input type="number" id="edad" name="edad" min="1" max="99" placeholder="Ej. 12" required>
                    </div>

                    <div class="field">
                        <label class="field__label" for="peso">Peso (kg)</label>
                        <input type="number" id="peso" name="peso" min="1" step="0.1" placeholder="Ej. 45.5" required>
                    </div>

                    <div class="field">
                        <label class="field__label" for="posicion">Posición</label>
                        <select id="posicion" name="posicion" required>
                            <option value="" disabled selected>Selecciona una posición</option>
                            <option value="delantero">Delantero</option>
                            <option value="centrocampista">Centrocampista</option>
                            <option value="defensa">Defensa</option>
                            <option value="portero">Portero</option>
                        </select>
                    </div>

                    <div class="field">
                        <label class="field__label" for="video">Vídeo del gesto</label>
                        <div class="field--file">
                            <input type="file" id="video" name="video" accept="video/*" required>
                            <p class="field__hint">MP4, MOV, AVI o MKV</p>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Analizar vídeo ⚽</button>
                </form>
            </div>
        </div>
        <div class="page-links">
            <a href="/historial" class="back-link">📜 Ver historial</a>
        </div>
    </div>
</body>
</html>
